name: OS Compatibility Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  comp_test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-2022, macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[test]
      - run: branb test
